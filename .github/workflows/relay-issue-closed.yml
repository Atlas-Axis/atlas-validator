# Learning Loop — Relay issue closure to ops-hq
#
# Copy this file to .github/workflows/relay-issue-closed.yml
# in any repo where ops-hq-bot creates issues.
#
# When an issue is closed in this repo, it dispatches an event
# to ops-hq so the journal entry can be updated with the resolution.

name: Relay issue closure to ops-hq

permissions:
  contents: read

on:
  issues:
    types: [closed]

jobs:
  relay:
    # Only relay issues created by ops-hq-bot
    if: github.event.issue.user.login == 'ops-hq-bot[bot]'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.OPS_HQ_APP_ID }}
          private-key: ${{ secrets.OPS_HQ_APP_PRIVATE_KEY }}
          owner: Atlas-Axis

      - name: Dispatch to ops-hq
        # Security: env-var pattern (Wiz #15) — attacker-controllable fields
        # like issue.title pass through env vars instead of being interpolated
        # directly into the shell command. Prevents template-injection where
        # a malicious title could break out of quotes and execute arbitrary
        # code. See plan §4.11.
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          CLOSED_BY: ${{ github.event.sender.login }}
        run: |
          gh api repos/Atlas-Axis/ops-hq/dispatches \
            -f event_type=issue-closed \
            -f "client_payload[repo]=$REPO" \
            -f "client_payload[issue_number]=$ISSUE_NUMBER" \
            -f "client_payload[issue_title]=$ISSUE_TITLE" \
            -f "client_payload[closed_by]=$CLOSED_BY"
